<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Algo Glockenspiel UI Mockup</title>
    <link rel="stylesheet" href="../../../web/styles.css" />
  </head>
  <body data-ui-surface="plugin-mockup">
    <main class="studio-shell">
      <header class="studio-topbar">
        <div class="brand">
          <img src="../../../web/assets/glockenmark.svg" alt="" class="brand-mark" />
          <div>
            <p class="brand-kicker">Plugin Editor Mockup</p>
            <h1>Algo Glockenspiel VST3</h1>
          </div>
        </div>

        <button class="menu-button" type="button" aria-label="Open menu">
          <span></span><span></span><span></span>
        </button>
      </header>

      <section class="preset-strip" aria-label="Preset controls">
        <label class="preset-field">
          <span>Preset</span>
          <select id="preset-select">
            <option>Default Concert Glockenspiel</option>
          </select>
        </label>

        <button type="button" class="preset-action" disabled>Save</button>
        <button type="button" class="preset-action" disabled>Load</button>
        <p class="preset-note">Shared visual shell for the future plugin editor.</p>
      </section>

      <section class="instrument-card">
        <div class="instrument-main">
          <aside class="control-rail" aria-label="Performance controls">
            <label class="dial-control" for="gain">
              <span class="dial-label">Volume</span>
              <div class="dial-assembly">
                <input id="gain" class="dial-input" type="range" min="10" max="100" value="70" />
                <div class="dial-face" data-dial-face>
                  <div class="dial-indicator"></div>
                </div>
              </div>
              <output id="gain-value" for="gain">70%</output>
            </label>

            <label class="dial-control" for="velocity">
              <span class="dial-label">Velocity</span>
              <div class="dial-assembly dial-assembly-small">
                <input id="velocity" class="dial-input" type="range" min="1" max="127" value="96" />
                <div class="dial-face" data-dial-face>
                  <div class="dial-indicator"></div>
                </div>
              </div>
              <output id="velocity-value" for="velocity">96</output>
            </label>

            <p id="status" class="status-panel">Editor mockup. No audio engine attached.</p>
          </aside>

          <section class="instrument-stage" aria-label="Glockenspiel editor view">
            <div class="rack-wrap">
              <div class="rack-shadow"></div>
              <div class="rack">
                <div class="rail rail-top"></div>
                <div class="rail rail-bottom"></div>
                <div class="note-lane note-lane-sharps" id="bars-accidental"></div>
                <div class="note-lane note-lane-naturals" id="bars-natural"></div>
                <img src="../../../web/assets/mallet.svg" alt="" class="mallet" />
              </div>
            </div>
          </section>
        </div>

        <section class="keyboard-panel" aria-label="Piano alignment">
          <div class="keyboard" id="piano"></div>
        </section>
      </section>
    </main>

    <script type="module" src="mockup.js"></script>
  </body>
</html>
